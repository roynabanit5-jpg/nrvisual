<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<style>
body{
background:#0d1117;color:#fff;
font-family:sans-serif;
display:flex;justify-content:center;align-items:center;height:100vh;
}
.box{
width:350px;background:#111;padding:20px;border-radius:15px;text-align:center;
}
.item{
display:flex;justify-content:space-between;
background:#1a1a1a;padding:10px;margin:5px;border-radius:10px;
}
.btn{
width:100%;padding:10px;margin-top:10px;
border:none;border-radius:10px;
background:#00c6ff;color:#fff;
}
.loader,.success{display:none;}
</style>
</head>

<body>

<div class="box">

<h2>Checkout</h2>

<div id="items"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<p>UPI: roynabanit5@oksbi</p>

<button onclick="payNow()" class="btn">Pay Now</button>
<button onclick="confirmOrder()" class="btn">Confirm Order</button>

<div class="loader" id="loader">
<p>Processing...</p>
</div>

<div class="success" id="success">
<p>✅ Order Confirmed</p>
</div>

</div>

<script>
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let items=document.getElementById("items");
let total=0;

cart.forEach(i=>{
total+=i.price;
items.innerHTML+=`<div class="item"><span>${i.name}</span><span>₹${i.price}</span></div>`;
});

document.getElementById("total").innerText=total;

function payNow(){
window.open(`upi://pay?pa=roynabanit5@oksbi&pn=NRVisuals&am=${total}&cu=INR`);
}

function confirmOrder(){
document.getElementById("loader").style.display="block";

setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("success").style.display="block";

let msg="NR Visuals Order:%0A";
cart.forEach(i=>{
msg+=`${i.name} - ₹${i.price}%0A`;
});
msg+=`Total: ₹${total}%0AI have paid`;

setTimeout(()=>{
window.location.href=`https://wa.me/917630076047?text=${msg}`;
},2000);

},2000);
}
</script>

</body>
</html>
