<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#0d1117;
color:#fff;
overflow-x:hidden;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:15px 40px;
position:fixed;
width:100%;
top:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:999;
}

nav h2{color:#00c6ff;}
nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

background:
url('https://www.transparenttextures.com/patterns/cubes.png'),
linear-gradient(135deg,#0d1117,#1a1f2b);
}

.hero h1{
font-size:60px;
}

.hero span{
color:#00c6ff;
}

.btn{
margin-top:20px;
background:linear-gradient(45deg,#00c6ff,#ff4d4d);
padding:12px 25px;
border-radius:30px;
text-decoration:none;
color:#fff;
}

/* SECTION */
.section{padding:80px 20px;text-align:center;}

.glass{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
transition:.3s;
border:1px solid rgba(255,255,255,0.1);
}

.glass:hover{
transform:translateY(-10px);
box-shadow:0 0 30px rgba(0,198,255,0.5);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

img{width:100%;border-radius:10px;}

/* CART */
.cart{
position:fixed;
top:80px;
right:20px;
background:#111;
padding:10px 15px;
border-radius:10px;
}

/* WHATSAPP */
.wp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#111;
padding:25px;
border-radius:15px;
text-align:center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<h2>NR Visuals</h2>
<div>
<a href="#">Home</a>
<a href="#portfolio">Portfolio</a>
<a href="#services">Services</a>
<a href="#contact">Contact</a>
</div>
</nav>

<div class="cart">🛒 <span id="count">0</span></div>

<!-- HERO -->
<section class="hero">
<h1><span>NR</span> Visuals</h1>
<p>Graphic Designer Website</p>
<p style="color:#ff4d4d;">ESTD 2026</p>
<a href="#portfolio" class="btn">View Our Work</a>
</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="section">
<h2>Portfolio</h2>

<div class="grid">
<div class="glass"><img src="https://via.placeholder.com/300"><p>Brand Identity</p></div>
<div class="glass"><img src="https://via.placeholder.com/300"><p>UI Design</p></div>
<div class="glass"><img src="https://via.placeholder.com/300"><p>Motion Design</p></div>
</div>
</section>

<!-- SERVICES -->
<section id="services" class="section">
<h2>Services</h2>

<div class="grid">
<div class="glass">
<h3>DP Design</h3>
<button onclick="add('DP ₹79')" class="btn">Add</button>
</div>

<div class="glass">
<h3>Poster</h3>
<button onclick="add('Poster ₹99')" class="btn">Add</button>
</div>

<div class="glass">
<h3>Thumbnail</h3>
<button onclick="add('Thumbnail ₹149')" class="btn">Add</button>
</div>
</div>
</section>

<!-- ORDER -->
<section class="section">
<h2>Place Order</h2>
<button onclick="openModal()" class="btn">Order Now</button>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
<h2>Contact</h2>
<p>Nabanit Roy</p>
<p>roynabanit5@gmail.com</p>
<p>7630076047</p>
</section>

<a href="https://wa.me/917630076047" class="wp">
<i class="fab fa-whatsapp"></i>
</a>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>Confirm Order?</h3>
<button onclick="confirmOrder()" class="btn">Yes</button>
<button onclick="closeModal()" class="btn">Cancel</button>
</div>
</div>

<script>
let cart=[];

function add(item){
cart.push(item);
document.getElementById("count").innerText=cart.length;
}

function openModal(){
if(cart.length==0){
alert("Cart empty");
return;
}
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function confirmOrder(){
let msg="Hello NR Visuals, I want:\n"+cart.join(", ");
window.location.href="https://wa.me/917630076047?text="+encodeURIComponent(msg);
}
</script>

</body>
</html>
