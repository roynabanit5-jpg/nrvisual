<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #B3E5FC, #4FC3F7, #0288D1);
  color: #111; /* MAIN TEXT BLACK */
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  position:relative;
}

nav a{
  text-decoration:none;
  color:#111;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  font-size:20px;
}

.logo-img{
  width:35px;
  height:35px;
  border-radius:6px;
}

/* MENU */
.menu-icon{
  position:absolute;
  right:20px;
  font-size:26px;
  cursor:pointer;
  display:none;
}

.nav-links{
  position:absolute;
  right:80px;
  display:flex;
  gap:25px;
}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}

.hero h1{
  font-size:40px;
}

.hero p{
  margin:15px 0;
  color:#333;
}

/* BUTTON */
.btn{
  padding:12px 25px;
  background: linear-gradient(135deg, #00B7FF, #0288D1);
  color:#fff;
  border-radius:8px;
  border:none;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* SECTION */
.container{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* CART */
.cart{
  position:absolute;
  top:20px;
  left:20px;
}

/* FORM */
input,select,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
}

/* SERVICE */
.service-card{
  text-align:center;
  padding:30px 20px;
  transition:0.3s;
}

.service-card i{
  font-size:40px;
  margin-bottom:15px;
  color:#0288D1;
}

.service-card p{
  color:#555;
}

.service-card:hover{
  transform:translateY(-8px);
}

/* PAYMENT */
.pay-box{
  display:flex;
  gap:15px;
  justify-content:center;
  margin-top:10px;
}

.pay-box button{
  padding:10px 15px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

/* CONTACT */
.contact-card{
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  max-width:400px;
  margin:auto;
  text-align:center;
}

.tagline{
  color:#666;
}

/* BUTTON COLORS */
.btn.wa{ background:#25D366; }
.btn.insta{ background:#E1306C; }

/* MOBILE */
@media(max-width:768px){
  .menu-icon{display:block;}

  .nav-links{
    top:70px;
    right:20px;
    flex-direction:column;
    background:#fff;
    padding:20px;
    border-radius:10px;
    display:none;
  }

  .nav-links.active{display:flex;}
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
}

</style>
</head>
