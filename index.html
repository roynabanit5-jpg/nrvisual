<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#f9fafb;
}

/* NAV */
nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
}

.logo-img{
  width:35px;
  border-radius:6px;
}

/* MENU */
.menu-icon{
  font-size:24px;
  cursor:pointer;
  display:none;
}

.nav-links{
  display:flex;
  gap:25px;
}

@media(max-width:768px){
  .menu-icon{display:block;}

  .nav-links{
    position:absolute;
    top:70px;
    right:20px;
    flex-direction:column;
    background:#fff;
    padding:20px;
    border-radius:10px;
    display:none;
  }

  .nav-links.active{display:flex;}
}

/* CART */
.cart{
  cursor:pointer;
  font-size:18px;
}

/* CART BOX */
.cart-box{
  position:fixed;
  top:70px;
  right:20px;
  width:260px;
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  display:none;
}

.cart-box ul{
  list-style:none;
  max-height:200px;
  overflow:auto;
}

.cart-box li{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.btn{
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
  width:100%;
}

/* SECTION */
.container{
  max-width:1100px;
  margin:auto;
  padding:50px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
}

/* FORM */
input,select,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>

<div class="logo">
  <img src="logo.png" class="logo-img">
  NR Visuals
</div>

<div class="nav-links" id="navLinks">
  <a href="#services">Services</a>
  <a href="#pricing">Pricing</a>
  <a href="#membership">Membership</a>
  <a href="#contact">Contact</a>
</div>

<div class="cart" onclick="toggleCart()">
  🛒 <span id="cartCount">0</span>
</div>

<div class="menu-icon" onclick="toggleMenu()">
  <i class="fas fa-bars"></i>
</div>

</nav>

<!-- CART BOX -->
<div class="cart-box" id="cartBox">
<h3>Your Cart</h3>
<ul id="cartItems"></ul>

<button class="btn" onclick="clearCart()">Clear Cart</button>
<button class="btn" onclick="checkout()">Order on WhatsApp</button>
</div>

<!-- HERO -->
<section class="container">
<h1>Designs That Grow Your Brand</h1>
<p>High-quality thumbnails, posters & social media designs</p>
</section>

<!-- PRICING -->
<section class="container" id="pricing">
<h2>Pricing</h2>
<div class="grid">

<div class="card">
<h3>Thumbnail ₹49</h3>
<button onclick="addToCart('Thumbnail ₹49')">Add</button>
</div>

<div class="card">
<h3>Instagram ₹49</h3>
<button onclick="addToCart('Instagram ₹49')">Add</button>
</div>

<div class="card">
<h3>Logo ₹149</h3>
<button onclick="addToCart('Logo ₹149')">Add</button>
</div>

</div>
</section>

<!-- CONTACT -->
<section class="container" id="contact">
<h2>Contact</h2>
<p>WhatsApp: 7630076047</p>
</section>

<script>
let cart=[];

function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}

function toggleCart(){
  let box=document.getElementById("cartBox");
  box.style.display = box.style.display==="block"?"none":"block";
}

function addToCart(item){
  cart.push(item);
  updateCart();
}

function updateCart(){
  document.getElementById("cartCount").innerText=cart.length;

  let list=document.getElementById("cartItems");
  list.innerHTML="";

  cart.forEach((item,i)=>{
    let li=document.createElement("li");
    li.innerHTML=`${item} <button onclick="removeItem(${i})">❌</button>`;
    list.appendChild(li);
  });
}

function removeItem(i){
  cart.splice(i,1);
  updateCart();
}

function clearCart(){
  cart=[];
  updateCart();
}

function checkout(){
  if(cart.length===0){alert("Cart empty");return;}

  let msg="Order:\n"+cart.join("\n");
  window.open(`https://wa.me/917630076047?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
