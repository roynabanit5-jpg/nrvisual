<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Visuals | Premium Design Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  background:#050505;
  color:#fff;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  font-family:Poppins;
  font-size:25px;
}

/* NAV */
nav{
  position:sticky;top:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  padding:15px;
  display:flex;
  justify-content:space-between;
}

nav a{color:#fff;text-decoration:none;margin-left:15px;}

.container{max-width:1100px;margin:auto;padding:60px 20px;}

h1,h2,h3{font-family:Poppins;}

.btn{
  background:#00bfff;
  padding:12px 25px;
  border-radius:8px;
  text-decoration:none;
  color:#000;
  font-weight:bold;
}

/* HERO */
.hero{text-align:center;padding:100px 20px;}
.hero h1{font-size:42px;}
.hero p{color:#aaa;margin:15px 0;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}
.card:hover{transform:translateY(-10px);}

/* FORM */
input,select,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:5px;
}

form button{
  width:100%;
  padding:12px;
  background:#00bfff;
  border:none;
  font-weight:bold;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
  color:#fff;
  font-size:20px;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">NR Visuals Loading...</div>

<!-- NAV -->
<nav>
  <h3>NR Visuals</h3>
  <div>
    <a href="#services">Services</a>
    <a href="#order">Order</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Premium Graphic Design</h1>
  <p>High quality thumbnails, posters & social media designs</p>
  <a href="#order" class="btn">Place Order</a>
</section>

<!-- SERVICES -->
<section class="container" id="services">
<h2>Services</h2>
<div class="grid">
<div class="card">YouTube Thumbnails (1280×720)</div>
<div class="card">Instagram Designs (1080×1080)</div>
<div class="card">Poster Designs (A4/A3)</div>
</div>
</section>

<!-- ORDER FORM -->
<section class="container" id="order">
<h2>Place Your Order</h2>

<form onsubmit="sendWhatsApp(); return false;">
<input type="text" id="name" placeholder="Your Name" required>
<select id="service">
<option>YouTube Thumbnail</option>
<option>Instagram Post</option>
<option>Poster</option>
</select>
<textarea id="details" placeholder="Describe your design..." required></textarea>
<input type="file" id="file">
<button type="submit">Send Order</button>
</form>

</section>

<!-- FOOTER -->
<div class="container">
<p style="text-align:center;">© 2026 NR Visuals</p>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/917630076047" class="whatsapp">💬</a>

<script>

/* LOADER */
window.onload = () => {
  document.getElementById("loader").style.display="none";
};

/* WHATSAPP AUTO MESSAGE */
function sendWhatsApp(){
  let name=document.getElementById("name").value;
  let service=document.getElementById("service").value;
  let details=document.getElementById("details").value;

  let msg=`Hello, I want to order:\nName: ${name}\nService: ${service}\nDetails: ${details}`;
  let url=`https://wa.me/917630076047?text=${encodeURIComponent(msg)}`;
  
  window.open(url,'_blank');
}

</script>

</body>
</html>
