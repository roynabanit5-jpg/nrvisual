<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Visuals</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{font-family:'Poppins',sans-serif;}

body{
  background:#f5f6f8;
  color:#222;
}

.section{padding:70px 0;}

.gradient{
  background:linear-gradient(45deg,#007bff,#ff4d4d,#ffc107);
  -webkit-background-clip:text;
  color:transparent;
  font-weight:700;
}

.card{
  background:#ffffff;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  transition:.3s;
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

.btn-main{
  background:#007bff;
  color:#fff;
  border:none;
  padding:10px 20px;
  border-radius:25px;
}

.profile-card{
  max-width:350px;
  margin:auto;
  padding:30px;
  border-radius:20px;
  background:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.profile-img{
  width:120px;
  border-radius:50%;
}

.stats{
  display:flex;
  justify-content:space-around;
  margin-top:15px;
}

.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:15px;
  border-radius:50%;
}

/* CUSTOM MODAL */
.modal-custom{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:300px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="section text-center">
<div class="container">
<h1 class="gradient">NR Visuals</h1>
<p>All Designs in One Place</p>
<p>🚀 1+ Year • 200+ Clients</p>
</div>
</section>

<!-- PROFILE -->
<section class="section text-center">
<div class="container">
<div class="profile-card">
<img src="https://via.placeholder.com/120" class="profile-img">
<h3 class="mt-3">Nabanit Roy</h3>
<p>Founder</p>

<div class="stats">
<div><b>1+</b><br>Year</div>
<div><b>200+</b><br>Clients</div>
</div>

<a href="https://wa.me/917630076047" class="btn btn-main mt-3">Contact</a>
</div>
</div>
</section>

<!-- SERVICES -->
<section class="section text-center">
<div class="container">
<h2 class="gradient">Services</h2>

<div class="row g-4 mt-4">
<div class="col-md-4"><div class="card p-4"><h4>DP</h4><button onclick="selectService('DP')" class="btn btn-main">Select</button></div></div>
<div class="col-md-4"><div class="card p-4"><h4>Poster</h4><button onclick="selectService('Poster')" class="btn btn-main">Select</button></div></div>
<div class="col-md-4"><div class="card p-4"><h4>Thumbnail</h4><button onclick="selectService('Thumbnail')" class="btn btn-main">Select</button></div></div>
</div>
</div>
</section>

<!-- PRICING -->
<section id="pricing" class="section text-center">
<div class="container">
<h2 class="gradient">Pricing</h2>

<div class="row g-4 mt-4">
<div class="col-md-3"><div class="card p-4"><h3>₹79</h3><button onclick="openModal('₹79')" class="btn btn-main">Order</button></div></div>
<div class="col-md-3"><div class="card p-4"><h3>₹99</h3><button onclick="openModal('₹99')" class="btn btn-main">Order</button></div></div>
<div class="col-md-3"><div class="card p-4"><h3>₹149</h3><button onclick="openModal('₹149')" class="btn btn-main">Order</button></div></div>
<div class="col-md-3"><div class="card p-4"><h3>₹199</h3><button onclick="openModal('₹199')" class="btn btn-main">Order</button></div></div>
</div>
</div>
</section>

<!-- MEMBERSHIP -->
<section class="section text-center">
<div class="container">
<h2 class="gradient">Membership</h2>

<div class="row g-4 mt-4">
<div class="col-md-6"><div class="card p-4"><h3>₹499</h3><button onclick="openModal('1 Month ₹499')" class="btn btn-main">Buy</button></div></div>
<div class="col-md-6"><div class="card p-4"><h3>₹899</h3><button onclick="openModal('2 Month ₹899')" class="btn btn-main">Buy</button></div></div>
</div>
</div>
</section>

<!-- PAYMENT -->
<section class="section text-center">
<div class="container">
<h2 class="gradient">Payment</h2>
<p>UPI: roynabanit5@oksbi</p>

<a href="upi://pay?pa=roynabanit5@oksbi&pn=NRVisuals&cu=INR">Pay Now</a>
</div>
</section>

<!-- REVIEW -->
<section class="section text-center">
<div class="container">
<h2 class="gradient">Reviews</h2>

<div id="reviewList"></div>

<input id="name" placeholder="Name" class="form-control mt-3">
<textarea id="review" class="form-control mt-2"></textarea>
<button onclick="addReview()" class="btn btn-main mt-2">Submit</button>
</div>
</section>

<!-- MODAL -->
<div id="modal" class="modal-custom">
  <div class="modal-box">
    <h5 id="modalText"></h5>
    <button onclick="confirmOrder()" class="btn btn-main mt-2">Confirm</button>
    <button onclick="closeModal()" class="btn btn-outline-dark mt-2">Cancel</button>
  </div>
</div>

<a href="https://wa.me/917630076047" class="whatsapp"><i class="fab fa-whatsapp"></i></a>

<script>
let selectedService="";
let selectedPlan="";

function selectService(s){
selectedService=s;
document.getElementById("pricing").scrollIntoView({behavior:"smooth"});
}

function openModal(plan){
if(!selectedService){alert("Select service first");return;}
selectedPlan=plan;
document.getElementById("modalText").innerText="Confirm "+selectedService+" - "+plan+" ?";
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function confirmOrder(){
let msg="Hello NR Visuals, I want "+selectedService+" - "+selectedPlan;
window.location.href="https://wa.me/917630076047?text="+encodeURIComponent(msg);
}

function addReview(){
let n=document.getElementById("name").value;
let r=document.getElementById("review").value;
document.getElementById("reviewList").innerHTML+=`<p><b>${n}</b>: ${r}</p>`;
}
</script>

</body>
</html>
