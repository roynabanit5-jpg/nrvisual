<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Visuals</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0d1117;color:#fff;}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
.logo{width:150px;margin-bottom:10px;}

.btn{
background:linear-gradient(45deg,#00c6ff,#ff4d4d);
padding:12px 25px;
border:none;
border-radius:25px;
color:#fff;
cursor:pointer;
margin-top:10px;
}

/* SECTION */
.section{padding:60px 20px;text-align:center;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<img src="logo.png" class="logo">
<h1>NR Visuals</h1>
<p>Premium Design Services</p>
<button onclick="scrollToPlans()" class="btn">Start Ordering</button>
</section>

<!-- PLANS -->
<section id="plans" class="section">
<h2>Choose Your Plan</h2>

<div class="grid">

<div class="card">
<h3>₹79</h3>
<button onclick="buyNow('Starter',79)" class="btn">Order Now</button>
<button onclick="addToCart('Starter',79)" class="btn">Add</button>
</div>

<div class="card">
<h3>₹99</h3>
<button onclick="buyNow('Creator',99)" class="btn">Order Now</button>
<button onclick="addToCart('Creator',99)" class="btn">Add</button>
</div>

<div class="card">
<h3>₹149</h3>
<button onclick="buyNow('Pro',149)" class="btn">Order Now</button>
<button onclick="addToCart('Pro',149)" class="btn">Add</button>
</div>

<div class="card">
<h3>₹199</h3>
<button onclick="buyNow('Elite',199)" class="btn">Order Now</button>
<button onclick="addToCart('Elite',199)" class="btn">Add</button>
</div>

</div>
</section>

<script>
function scrollToPlans(){
document.getElementById("plans").scrollIntoView({behavior:"smooth"});
}

function buyNow(name,price){
localStorage.setItem("cart", JSON.stringify([{name,price}]));
window.location.href="cart.html";
}

function addToCart(name,price){
let cart=JSON.parse(localStorage.getItem("cart")) || [];
cart.push({name,price});
localStorage.setItem("cart", JSON.stringify(cart));
alert("Added to cart");
}
</script>

</body>
</html>
